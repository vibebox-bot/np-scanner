<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP BARCODE PRO</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video{
    width:100%;
    height:60vh;
    background:#000;
    object-fit:cover;
}

#ttn{
    font-size:24px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin-top:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP BARCODE PRO</h2>

<button onclick="startScan()">📷 СТАРТ</button>

<video id="video" autoplay playsinline></video>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let stream = null;

async function startScan(){

    document.getElementById("status").innerText = "📷 запуск камеры...";

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{ ideal:"environment" }
            }
        });

        const video = document.getElementById("video");
        video.srcObject = stream;

        await video.play();

        document.getElementById("status").innerText =
        "🎯 наведите на код";

        startDetection(video);

    }catch(e){
        console.log(e);
        document.getElementById("status").innerText =
        "❌ камера недоступна";
    }
}

function startDetection(video){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    async function tick(){

        if(video.readyState === video.HAVE_ENOUGH_DATA){

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video,0,0,canvas.width,canvas.height);

            const barcodeDetector = new BarcodeDetector({
                formats: [
                    "code_128",
                    "code_39",
                    "ean_13",
                    "ean_8",
                    "qr_code",
                    "data_matrix",
                    "pdf417"
                ]
            });

            try{

                const barcodes = await barcodeDetector.detect(canvas);

                if(barcodes.length > 0){

                    let text = barcodes[0].rawValue;

                    if(text && text !== last){

                        last = text;

                        document.getElementById("ttn").innerText = text;
                        document.getElementById("status").innerText = "✔ СКАН";

                        document.getElementById("ok").play().catch(()=>{});

                        fetch(SCRIPT_URL,{
                            method:"POST",
                            headers:{
                                "Content-Type":"text/plain"
                            },
                            body:JSON.stringify({ttn:text})
                        });

                    }
                }

            }catch(e){
                // тихо игнорим ошибки детектора
            }
        }

        requestAnimationFrame(tick);
    }

    tick();
}

</script>

</body>
</html>
