<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER FINAL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* TTN сверху */
#ttn{
    font-size:28px;
    font-weight:bold;
    color:#00f2fe;
    padding:12px;
    min-height:40px;
    word-break:break-all;
}

/* статус */
#status{
    font-size:14px;
    color:#aaa;
    min-height:20px;
}

/* камера */
.scanner{
    position:relative;
    width:92%;
    height:55vh;
    margin:10px auto;
    border-radius:16px;
    overflow:hidden;
    background:#000;
}

.scanner video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* линия */
.line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

/* фокус */
.focus{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    height:90px;
    border:2px solid #00f2fe;
    border-radius:12px;
}

/* кнопка */
button{
    padding:14px 22px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

/* скрытые аудио */
audio{display:none;}
</style>
</head>

<body>

<div id="ttn">---</div>
<div id="status">Нажмите СКАН</div>

<div class="scanner">
    <div class="line"></div>
    <div class="focus"></div>
    <div id="camera"></div>
</div>

<button onclick="startScan()">SCAN</button>

<audio id="okSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="errSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2947/2947-preview.mp3">
</audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let started = false;
let lastTTN = null;
let buffer = {};
let cooldown = false;

const ttnBox = document.getElementById("ttn");
const statusBox = document.getElementById("status");

const okSound = document.getElementById("okSound");
const errSound = document.getElementById("errSound");


// 🚀 СТАРТ
function startScan(){

if(started) return;
started = true;

statusBox.innerText = "📷 запуск камеры...";

Quagga.init({
    inputStream:{
        type:"LiveStream",
        target: document.querySelector('#camera'),
        constraints:{
            facingMode:"environment"
        }
    },
    decoder:{
        readers:["code_128_reader"]
    },
    locate:true,
    frequency: 10
}, function(err){

    if(err){
        statusBox.innerText = "❌ ошибка камеры";
        return;
    }

    statusBox.innerText = "🎯 наведите на код";
    Quagga.start();
});

Quagga.onDetected(onScan);

}


// 🎯 СКАН
function onScan(result){

if(cooldown) return;

let code = result.codeResult.code;
if(!code) return;

let digits = code.replace(/\D/g,'');

// ❌ фильтр НП
if(!digits.startsWith("20")) return;
if(digits.length < 14 || digits.length > 20) return;

// 🔁 стабильность (анти шум)
buffer[digits] = (buffer[digits] || 0) + 1;
if(buffer[digits] < 3) return;

buffer = {};

// 🚫 антидубль
if(digits === lastTTN){
    statusBox.innerText = "⚠ дубль";
    errSound.play().catch(()=>{});
    return;
}

lastTTN = digits;
cooldown = true;

// 📦 UI
ttnBox.innerText = digits;
statusBox.innerText = "✔ СКАНЕРОВАНО";

okSound.play().catch(()=>{});
if(navigator.vibrate) navigator.vibrate(150);

// 📤 отправка в Google Sheets
fetch(SCRIPT_URL,{
    method:"POST",
    headers:{
        "Content-Type":"text/plain"
    },
    body: JSON.stringify({ttn:digits})
});

// ⛔ стоп камеры после скана
Quagga.stop();
started = false;

// 🔁 перезапуск через паузу
setTimeout(()=>{
    cooldown = false;
    statusBox.innerText = "Нажмите СКАН";
},2500);

}

</script>

</body>
</html>
