<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER ULTRA</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0b0b0b,#111);
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* TTN */
#ttn{
    font-size:32px;
    font-weight:900;
    color:#00f2fe;
    padding:14px;
    min-height:40px;
    word-break:break-all;
}

/* STATUS */
#status{
    font-size:15px;
    color:#aaa;
    min-height:20px;
}

/* CAMERA */
.scanner{
    position:relative;
    width:92%;
    height:56vh;
    margin:10px auto;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 35px rgba(0,242,254,0.12);
}

/* zoom */
.scanner video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.3);
}

/* ROI (центр скан) */
.roi{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:82%;
    height:110px;
    border:2px solid #00f2fe;
    border-radius:14px;
    box-shadow:0 0 30px rgba(0,242,254,0.25);
    transition:0.15s;
}

/* красный flash */
.roi.active{
    border-color:#ff3b3b;
    box-shadow:0 0 35px rgba(255,59,59,0.35);
}

/* scan glow animation (очень мягкая) */
.glow{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
    opacity:0.6;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

audio{display:none;}
</style>
</head>

<body>

<div id="ttn">---</div>
<div id="status">инициализация...</div>

<div class="scanner">
    <div id="camera"></div>
    <div class="roi" id="roi"></div>
    <div class="glow"></div>
</div>

<audio id="okSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="errSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2947/2947-preview.mp3">
</audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let lastTTN = "";
let buffer = {};
let cooldown = false;

const ttnBox = document.getElementById("ttn");
const statusBox = document.getElementById("status");
const roi = document.getElementById("roi");

const okSound = document.getElementById("okSound");
const errSound = document.getElementById("errSound");

// 🚀 AUTO START
window.onload = () => {
    startScanner();
};

// 🔥 старт камеры сразу
function startScanner(){

setStatus("📷 запуск камеры...");

Quagga.init({
    inputStream:{
        type:"LiveStream",
        target: document.querySelector('#camera'),
        constraints:{
            facingMode:"environment"
        }
    },
    decoder:{
        readers:["code_128_reader"]
    },
    locate:true,
    frequency: 14
}, function(err){

    if(err){
        setStatus("❌ ошибка камеры");
        return;
    }

    Quagga.start();
    setStatus("🎯 скан активен");
});

Quagga.onDetected(handle);

}

// 🎯 MAIN SCAN
function handle(result){

if(cooldown) return;

let code = result.codeResult.code;
if(!code) return;

let digits = code.replace(/\D/g,'');

// 🔥 НП фильтр
if(!digits.startsWith("20")) return;
if(digits.length < 14 || digits.length > 20) return;

// 🔁 стабильность
buffer[digits] = (buffer[digits] || 0) + 1;
if(buffer[digits] < 3) return;

buffer = {};

// 🚫 дубль
if(digits === lastTTN){
    setStatus("⚠ дубль");
    errSound.play().catch(()=>{});
    return;
}

lastTTN = digits;
cooldown = true;

// UI
ttnBox.innerText = digits;
setStatus("✔ записано");

okSound.play().catch(()=>{});
if(navigator.vibrate) navigator.vibrate(150);

// 🔴 flash ROI
roi.classList.add("active");
setTimeout(()=>roi.classList.remove("active"),300);

// 📤 send
fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({ttn:digits})
});

// ⏱ cooldown
setTimeout(()=>{
    cooldown = false;
    setStatus("скан активен");
},1200);

}

// status helper
function setStatus(t){
    statusBox.innerText = t;
}

</script>

</body>
</html>
