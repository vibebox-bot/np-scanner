<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NP Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    margin:10px 0;
    font-size:24px;
}

#reader{
    width:100%;
    max-width:700px;
    margin:auto;
}

#result{
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
    color:#00ff99;
    word-break:break-all;
}

#status{
    margin-top:10px;
    color:#ccc;
}

</style>
</head>

<body>

<h1>NP Scanner</h1>

<div id="reader"></div>

<div id="result">Наведи камеру на штрихкод</div>
<div id="status">Запуск...</div>

<audio id="ok">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let lastCode = "";

function onScanSuccess(decodedText) {

    let code = decodedText.trim();

    if(!code) return;

    // НЕ режем длину вообще
    let digits = code.replace(/\s/g,'');

    // антидубль только по точному совпадению
    if(digits === lastCode) return;

    lastCode = digits;

    document.getElementById("result").innerText = digits;
    document.getElementById("status").innerText = "✔ СКАН";

    fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({ttn:digits})
    });
}

    lastCode = digits;

    document.getElementById("result").innerText = digits;
    document.getElementById("status").innerText =
    "✔ Отправка в таблицу";

    document.getElementById("ok").play().catch(()=>{});

    fetch(SCRIPT_URL,{
        method:"POST",
        headers:{
            "Content-Type":"text/plain"
        },
        body:JSON.stringify({
            ttn:digits
        })
    })
    .then(r=>r.text())
    .then(res=>{
        document.getElementById("status").innerText =
        "✔ " + res;
    })
    .catch(()=>{
        document.getElementById("status").innerText =
        "❌ Ошибка отправки";
    });
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    onScanSuccess
).then(()=>{
    document.getElementById("status").innerText =
    "🎯 Наведи на штрихкод";
}).catch(err=>{
    document.getElementById("status").innerText =
    "❌ Ошибка камеры";
    console.log(err);
});

</script>

</body>
</html>
