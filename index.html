<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP TERMINAL PRO</title>

<script src="https://unpkg.com/@zxing/library@0.20.0"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video{
    width:100%;
    height:60vh;
    background:#000;
    object-fit:cover;
}

#ttn{
    font-size:24px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP TERMINAL PRO</h2>

<button onclick="startScan()">📷 СТАРТ</button>

<video id="video"></video>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let scanning = false;

const codeReader = new ZXing.BrowserMultiFormatReader();

function startScan(){

document.getElementById("status").innerText = "📷 запуск камеры...";

navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: { ideal: "environment" }
    }
}).then(stream => {

    const video = document.getElementById("video");
    video.srcObject = stream;
    video.play();

    scanning = true;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const tick = () => {

        if(!scanning) return;

        if(video.readyState === video.HAVE_ENOUGH_DATA){

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video,0,0,canvas.width,canvas.height);

            const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);

            try{
                const result = codeReader.decodeBitmap(imageData);

                if(result){

                    let text = result.getText();

                    if(text && text !== last){

                        last = text;

                        document.getElementById("ttn").innerText = text;
                        document.getElementById("status").innerText = "✔ СКАН";

                        document.getElementById("ok").play().catch(()=>{});

                        fetch(SCRIPT_URL,{
                            method:"POST",
                            headers:{
                                "Content-Type":"text/plain"
                            },
                            body:JSON.stringify({ttn:text})
                        });
                    }
                }

            }catch(e){
                // игнор — это нормально для frame scanning
            }
        }

        requestAnimationFrame(tick);
    };

    tick();

    document.getElementById("status").innerText =
    "🎯 НАВЕДИ НА ШТРИХКОД";

}).catch(err=>{
    document.getElementById("status").innerText =
    "❌ нет доступа к камере";
    console.log(err);
});

}

</script>

</body>
</html>
