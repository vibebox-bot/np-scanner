<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER MAX</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video{
    width:100%;
    height:60vh;
    object-fit:cover;
    background:#000;
}

#ttn{
    font-size:22px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP SCANNER MAX</h2>

<button onclick="startScan()">📷 START</button>

<video id="video" autoplay playsinline></video>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let stream;
let detector;

// 🔥 fallback ZXing (если BarcodeDetector не сработает)
let fallbackReader;

async function startScan(){

document.getElementById("status").innerText = "📷 запуск камеры...";

// CAMERA
stream = await navigator.mediaDevices.getUserMedia({
    video:{
        facingMode:{ ideal:"environment" }
    }
});

const video = document.getElementById("video");
video.srcObject = stream;
await video.play();

// ============================
// 1) TRY BarcodeDetector (fast)
// ============================

if('BarcodeDetector' in window){

    detector = new BarcodeDetector({
        formats:[
            "code_128",
            "code_39",
            "ean_13",
            "ean_8",
            "qr_code",
            "data_matrix",
            "pdf417"
        ]
    });

    scanLoop(video);
}
else{
    // ============================
    // 2) fallback ZXing
    // ============================
    const script = document.createElement("script");
    script.src = "https://unpkg.com/@zxing/library@0.20.0";
    script.onload = ()=>startZXing(video);
    document.body.appendChild(script);
}

document.getElementById("status").innerText =
"🎯 наведите на код";

}

// ============================
// BARCODE DETECTOR LOOP
// ============================

async function scanLoop(video){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

async function loop(){

    if(video.readyState === video.HAVE_ENOUGH_DATA){

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video,0,0);

        try{

            const codes = await detector.detect(canvas);

            if(codes.length){

                let text = codes[0].rawValue;

                handleResult(text);
            }

        }catch(e){}
    }

    requestAnimationFrame(loop);
}

loop();

}

// ============================
// ZXING FALLBACK
// ============================

function startZXing(video){

const reader = new ZXing.BrowserMultiFormatReader();

reader.decodeFromVideoDevice(
    null,
    video,
    (result, err)=>{

        if(result){
            handleResult(result.getText());
        }
    }
);

}

// ============================
// COMMON RESULT HANDLER
// ============================

function handleResult(text){

if(!text) return;

text = text.trim();

// антидубль
if(text === last) return;

last = text;

document.getElementById("ttn").innerText = text;
document.getElementById("status").innerText = "✔ СКАН";

document.getElementById("ok").play().catch(()=>{});

fetch(SCRIPT_URL,{
    method:"POST",
    headers:{
        "Content-Type":"text/plain"
    },
    body:JSON.stringify({ttn:text})
});

}

</script>

</body>
</html>
