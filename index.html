<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NP SCANNER PWA</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

video{
    width:100%;
    height:60vh;
    background:#000;
    object-fit:cover;
}

#ttn{
    font-size:22px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}

.line{
    height:2px;
    background:#00f2fe;
    animation:scan 2s infinite;
}

@keyframes scan{
    0%{transform:translateY(0);}
    50%{transform:translateY(200px);}
    100%{transform:translateY(0);}
}
</style>
</head>

<body>

<h2>NP SCANNER PWA</h2>

<button onclick="start()">📷 START</button>

<video id="video" autoplay playsinline></video>

<div class="line"></div>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let stream;

async function start(){

    document.getElementById("status").innerText = "📷 запуск камеры...";

    stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{ ideal:"environment" }
        }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    document.getElementById("status").innerText = "🎯 наведите на код";

    scan(video);
}

function scan(video){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    function loop(){

        if(video.readyState === video.HAVE_ENOUGH_DATA){

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video,0,0);

            const img = ctx.getImageData(0,0,canvas.width,canvas.height);

            // ⚠️ встроенный BarcodeDetector (если поддерживается)
            if('BarcodeDetector' in window){

                const detector = new BarcodeDetector({
                    formats:["code_128","qr_code","ean_13","data_matrix","pdf417"]
                });

                detector.detect(img).then(barcodes=>{

                    if(barcodes.length){

                        let text = barcodes[0].rawValue;

                        if(text && text !== last){

                            last = text;

                            document.getElementById("ttn").innerText = text;
                            document.getElementById("status").innerText = "✔ СКАН";

                            fetch(SCRIPT_URL,{
                                method:"POST",
                                headers:{"Content-Type":"text/plain"},
                                body:JSON.stringify({ttn:text})
                            });
                        }
                    }

                }).catch(()=>{});

            }
        }

        requestAnimationFrame(loop);
    }

    loop();
}

// service worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
