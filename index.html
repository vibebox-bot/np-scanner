<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP TERMINAL PRO</title>

<script src="https://unpkg.com/@zxing/library@0.20.0"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

#ttn{
    font-size:28px;
    color:#00f2fe;
    margin-top:10px;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

.scanner{
    width:92%;
    height:60vh;
    margin:10px auto;
    background:#000;
    border-radius:16px;
    overflow:hidden;
    position:relative;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

.line.active{
    background:#ff2d2d;
}

button{
    padding:12px 20px;
    font-size:16px;
    margin-top:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP TERMINAL PRO</h2>

<button onclick="startScan()">📷 СТАРТ СКАНЕРА</button>

<div class="scanner">
    <video id="video"></video>
    <div class="line" id="line"></div>
</div>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
<audio id="dup" src="https://assets.mixkit.co/active_storage/sfx/555/555-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let cooldown = false;
let controls = null;

const status = document.getElementById("status");
const ttnBox = document.getElementById("ttn");
const line = document.getElementById("line");
const ok = document.getElementById("ok");
const dup = document.getElementById("dup");

function startScan(){

    status.innerText = "📷 запуск камеры...";

    const codeReader = new ZXing.BrowserMultiFormatReader();

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.EAN_8,
        ZXing.BarcodeFormat.QR_CODE
    ]);

    const reader = new ZXing.BrowserMultiFormatReader(hints);

    reader.decodeFromVideoDevice(
        null,
        "video",
        (result, err, ctrl) => {

            controls = ctrl;

            if(result && !cooldown){

                let text = result.getText().trim();

                if(!text) return;

                // 🔥 без ограничений по длине
                line.classList.add("active");
                setTimeout(()=>line.classList.remove("active"),150);

                if(text === last){
                    status.innerText = "⚠ Дубликат";
                    dup.play().catch(()=>{});
                    return;
                }

                last = text;
                cooldown = true;

                ttnBox.innerText = text;
                status.innerText = "✔ СКАН УСПЕШЕН";

                ok.play().catch(()=>{});

                fetch(SCRIPT_URL,{
                    method:"POST",
                    headers:{
                        "Content-Type":"text/plain"
                    },
                    body:JSON.stringify({
                        ttn:text
                    })
                })
                .then(r=>r.text())
                .then(res=>{
                    status.innerText = "✔ " + res;
                });

                setTimeout(()=>cooldown=false, 1200);
            }

            if(err){
                // игнорируем шум
            }
        }
    );

    status.innerText = "🎯 НАВЕДИ НА ШТРИХКОД";
}

</script>

</body>
</html>
