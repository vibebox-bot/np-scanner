<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER PWA</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* НЕ ЧЁРНЫЙ ЭКРАН — СТИЛЬ ПРЕВЬЮ */
.scanner{
    position:relative;
    width:100%;
    height:60vh;
    overflow:hidden;
    background:#222;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* зелёная зона фокуса */
.focus{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    height:90px;
    border:2px solid #00f2fe;
    border-radius:12px;
}

/* линия */
.line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

#ttn{
    font-size:22px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
}

button{
    padding:12px 20px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
    color:#000;
    font-weight:bold;
}
</style>
</head>

<body>

<h3>NP SCANNER PWA</h3>

<div class="scanner">
    <div class="line"></div>
    <div class="focus"></div>
    <div id="video"></div>
</div>

<div id="ttn">---</div>
<div id="status">готов</div>

<button onclick="startScan()">СТАРТ</button>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let buffer = {};
let started = false;

const status = document.getElementById("status");
const ttnBox = document.getElementById("ttn");

function startScan(){

if(started) return;
started = true;

status.innerText = "📷 запуск...";

Quagga.init({
    inputStream:{
        type:"LiveStream",
        target: document.querySelector('#video'),
        constraints:{
            facingMode:"environment",
            width: 1280,
            height: 720
        }
    },
    decoder:{
        readers:["code_128_reader"]
    },
    locate:true,
    frequency: 10
}, function(err){

    if(err){
        status.innerText = "Ошибка камеры";
        return;
    }

    Quagga.start();
    status.innerText = "наведите на код";
});

Quagga.onDetected(onScan);

}

function onScan(result){

let code = result.codeResult.code;
if(!code) return;

// 🔥 УБРАЛИ ОГРАНИЧЕНИЕ ДЛИНЫ (ВАЖНО)
let digits = code.replace(/\D/g,'');

// антишум
if(!digits) return;

// buffer для стабильности
buffer[digits] = (buffer[digits] || 0) + 1;

if(buffer[digits] < 2) return;

// reset buffer
buffer = {};

// антидубль
if(digits === last) return;

last = digits;

ttnBox.innerText = digits;
status.innerText = "✔ СКАН";

fetch(SCRIPT_URL,{
    method:"POST",
    body: JSON.stringify({ttn:digits})
});

Quagga.stop();
started = false;

setTimeout(()=>{
    status.innerText = "готов";
},2000);

}

// PWA service worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
