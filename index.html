<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER PRO MAX</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0b0b0b,#111);
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* TTN */
#ttn{
    font-size:30px;
    font-weight:800;
    color:#00f2fe;
    padding:14px;
    word-break:break-all;
    min-height:40px;
}

/* STATUS */
#status{
    font-size:15px;
    color:#aaa;
    min-height:22px;
}

/* CAMERA */
.scanner{
    position:relative;
    width:92%;
    height:55vh;
    margin:10px auto;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 25px rgba(0,242,254,0.2);
}

.scanner video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.25); /* 🔥 ZOOM */
}

/* CENTER ROI */
.roi{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    height:100px;
    border:2px solid #00f2fe;
    border-radius:14px;
}

/* SCAN LINE */
.line{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

button{
    padding:14px 26px;
    margin:12px;
    background:#00f2fe;
    border:none;
    border-radius:12px;
    font-weight:800;
    color:#000;
}

.ok{color:#00ff99;}
.err{color:#ff4d4d;}
.info{color:#aaa;}

audio{display:none;}
</style>
</head>

<body>

<div id="ttn">---</div>
<div id="status" class="info">Нажмите СКАН</div>

<div class="scanner">
    <div class="line"></div>
    <div class="roi"></div>
    <div id="camera"></div>
</div>

<button onclick="startScan()">SCAN</button>

<audio id="okSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="errSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2947/2947-preview.mp3">
</audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let started = false;
let lastTTN = null;
let buffer = {};
let cooldown = false;

const ttnBox = document.getElementById("ttn");
const statusBox = document.getElementById("status");

const okSound = document.getElementById("okSound");
const errSound = document.getElementById("errSound");

function setStatus(text,type){
    statusBox.innerText = text;
    statusBox.className = type;
}

// 🚀 START
function startScan(){

if(started) return;
started = true;

setStatus("📷 запуск камеры...", "info");

Quagga.init({
    inputStream:{
        type:"LiveStream",
        target: document.querySelector('#camera'),
        constraints:{
            facingMode:"environment"
        }
    },
    decoder:{
        readers:["code_128_reader"]
    },
    locate:true,
    frequency: 12
}, function(err){

    if(err){
        setStatus("❌ ошибка камеры","err");
        return;
    }

    Quagga.start();
    setStatus("🎯 наведите на центр","info");
});

Quagga.onDetected(onScan);

}


// 🎯 SCAN
function onScan(result){

if(cooldown) return;

let code = result.codeResult.code;
if(!code) return;

let digits = code.replace(/\D/g,'');

// фильтр НП
if(!digits.startsWith("20")) return;
if(digits.length < 14 || digits.length > 20) return;

// стабильность
buffer[digits] = (buffer[digits] || 0) + 1;
if(buffer[digits] < 3) return;

buffer = {};

// дубль
if(digits === lastTTN){
    setStatus("⚠ дубль","err");
    errSound.play().catch(()=>{});
    return;
}

lastTTN = digits;
cooldown = true;

// UI
ttnBox.innerText = digits;
setStatus("✔ записано","ok");

okSound.play().catch(()=>{});
if(navigator.vibrate) navigator.vibrate(150);

// отправка
fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body: JSON.stringify({ttn:digits})
});

Quagga.stop();
started = false;

setTimeout(()=>{
    cooldown = false;
    setStatus("Нажмите СКАН","info");
},2500);

}

</script>

</body>
</html>
