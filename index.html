<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoxScan</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.json">
<style>
body{
    margin:0;
    background:linear-gradient(180deg,#0b0b0b,#111);
    color:#fff;
    font-family:Arial;
    text-align:center;
}

/* TTN */
#ttn{
    font-size:32px;
    font-weight:900;
    color:#00f2fe;
    padding:14px;
    word-break:break-all;
    min-height:40px;
}

/* STATUS */
#status{
    font-size:15px;
    color:#aaa;
    min-height:20px;
}

/* CAMERA */
.scanner{
    position:relative;
    width:92%;
    height:56vh;
    margin:10px auto;
    border-radius:18px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 40px rgba(0,242,254,0.12);
}

/* VIDEO AI ZOOM */
.scanner video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scale(1.35);
    filter:contrast(1.25) brightness(1.05);
}

/* ROI */
.roi{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80%;
    height:110px;
    border:2px solid #00f2fe;
    border-radius:14px;
    box-shadow:0 0 30px rgba(0,242,254,0.25);
    transition:0.12s;
}

/* AI LOCK (когда поймал код) */
.roi.lock{
    border-color:#ff3b3b;
    box-shadow:0 0 35px rgba(255,59,59,0.4);
    transform:translate(-50%,-50%) scale(1.02);
}

/* soft scan glow */
.glow{
    position:absolute;
    width:100%;
    height:2px;
    background:#00f2fe;
    top:0;
    animation:scan 2s infinite linear;
    opacity:0.4;
}

@keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
}

audio{display:none;}
    
.ok{color:#00ff99;}
.err{color:#ff4d4d;}
.info{color:#aaa;}
.send{color:#00b7ff;}

    
</style>
</head>

<body>

<div id="ttn">---</div>
<div id="status">AI INIT...</div>

<div class="scanner">
    <div id="camera"></div>
    <div class="roi" id="roi"></div>
    <div class="glow"></div>
</div>

<audio id="okSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3">
</audio>

<audio id="errSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2947/2947-preview.mp3">
</audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let lastTTN = "";
let buffer = {};
let cooldown = false;

let stabilityMap = {}; // 🔥 AI stabilization

const ttnBox = document.getElementById("ttn");
const statusBox = document.getElementById("status");
const roi = document.getElementById("roi");

const okSound = document.getElementById("okSound");
const errSound = document.getElementById("errSound");

window.onload = () => startAI();


// 🚀 AI START
function startAI(){

setStatus("🧠 инициализация камеры...", "info");    

Quagga.init({
    inputStream:{
        type:"LiveStream",
        target: document.querySelector('#camera'),
        constraints:{
            facingMode:"environment"
        }
    },
    decoder:{
        readers:[
          "code_128_reader",
          "ean_reader",
          "ean_8_reader"
]
    },
    locate:true,
    frequency: 12
}, function(err){

    if(err){
        setStatus("❌ ошибка камеры");
        return;
    }

    Quagga.start();
    setStatus("🎯 скан активен", "info");

});

Quagga.onDetected(process);

}


// 🧠 AI PROCESS (crop + stabilize + zoom logic)
function process(result){
    
if(buffer[digits]) return;
buffer[digits] = true;
setTimeout(()=> delete buffer[digits], 800);

    
if(cooldown) return;

let code = result.codeResult.code;
if(!code) return;

let digits = code.replace(/\D/g,'');

// ❌ NP filter
if(!digits.startsWith("20")) return;
if(digits.length < 14 || digits.length > 20) return;

// 🔥 AI STABILIZATION (smart vote system)
stabilityMap[digits] = (stabilityMap[digits] || 0) + 1;

// require more confidence for unstable codes
let threshold = 2;    
// let threshold = digits.length > 16 ? 3 : 4;

if(stabilityMap[digits] < threshold) return;

// reset AI buffer
stabilityMap = {};

// 🚫 duplicate control
if(digits === lastTTN){
    setStatus("⚠ дубликат", "err");
    errSound.play().catch(()=>{});
    return;
}

lastTTN = digits;
cooldown = true;

// UI
ttnBox.innerText = digits;
setStatus("✔ сохранено", "ok");    

// 🔴 AI LOCK animation
roi.classList.add("lock");
setTimeout(()=>roi.classList.remove("lock"),350);

// sound
okSound.play().catch(()=>{});
if(navigator.vibrate) navigator.vibrate(120);

// 📤 send
fetch(SCRIPT_URL,{
    method:"POST",
    headers:{
        "Content-Type":"application/json"
    },
    body: JSON.stringify({ttn:digits})
});

// cooldown reset
setTimeout(()=>{
    cooldown = false;
    setStatus("AI scanning active");
},1000);

}


// status helper
function setStatus(t,type="info"){
    statusBox.innerText = t;
    statusBox.className = type;
}

</script>

</body>
</html>
