<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER PRO</title>

<script src="https://unpkg.com/@zxing/library@0.20.0"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

h2{
    margin:10px 0;
}

#video{
    width:100%;
    max-width:600px;
    height:60vh;
    background:#000;
    border-radius:12px;
}

#ttn{
    font-size:24px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP SCANNER PRO</h2>

<button onclick="startScan()">📷 СТАРТ СКАНЕРА</button>

<video id="video"></video>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
<audio id="dup" src="https://assets.mixkit.co/active_storage/sfx/555/555-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";
let cooldown = false;
let codeReader;

function startScan(){

    document.getElementById("status").innerText = "📷 запуск камеры...";

    const hints = new Map();
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
        ZXing.BarcodeFormat.CODE_128,
        ZXing.BarcodeFormat.QR_CODE,
        ZXing.BarcodeFormat.EAN_13,
        ZXing.BarcodeFormat.CODE_39,
        ZXing.BarcodeFormat.DATA_MATRIX,
        ZXing.BarcodeFormat.PDF_417
    ]);

    codeReader = new ZXing.BrowserMultiFormatReader(hints);

    codeReader.decodeFromConstraints(
        {
            video: {
                facingMode: { ideal: "environment" }, // задняя камера
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        },
        "video",
        (result, err, controls) => {

            if(result && !cooldown){

                let text = result.getText().trim();

                if(!text) return;

                // ❌ без ограничений длины
                if(text === last) return;

                last = text;
                cooldown = true;

                document.getElementById("ttn").innerText = text;
                document.getElementById("status").innerText = "✔ СКАН УСПЕШЕН";

                document.getElementById("ok").play().catch(()=>{});

                fetch(SCRIPT_URL,{
                    method:"POST",
                    headers:{
                        "Content-Type":"text/plain"
                    },
                    body:JSON.stringify({
                        ttn:text
                    })
                })
                .then(r=>r.text())
                .then(res=>{
                    document.getElementById("status").innerText = "✔ " + res;
                })
                .catch(()=>{
                    document.getElementById("status").innerText = "❌ ошибка отправки";
                });

                setTimeout(()=>cooldown=false, 1200);
            }

            if(err){
                // игнор
            }
        }
    );

    document.getElementById("status").innerText =
    "🎯 наведи на штрихкод";
}

</script>

</body>
</html>
