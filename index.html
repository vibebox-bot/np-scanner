<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER PRO</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

#reader{
    width:100%;
    max-width:600px;
    margin:auto;
    margin-top:10px;
}

#ttn{
    font-size:28px;
    color:#00f2fe;
    margin-top:10px;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    font-size:16px;
    margin-top:15px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}

</style>
</head>

<body>

<h2>NP SCANNER PRO</h2>

<button onclick="startScanner()">📷 Старт камеры</button>

<div id="reader"></div>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let html5QrCode;
let lastCode = "";

function onScanSuccess(decodedText){

    let code = decodedText.trim();

    if(!code) return;

// ❗ НЕ режем ничего
    let cleaned = code.replace(/\s/g,'');

// антидубль
    if(cleaned === lastCode) return;

    lastCode = cleaned;

    document.getElementById("ttn").innerText = cleaned;
    document.getElementById("status").innerText = "✔ СКАН";

    fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({ttn:cleaned})
    });
}

function startScanner(){

document.getElementById("status").innerText = "📷 запуск камеры...";

html5QrCode = new Html5Qrcode("reader");

// 💥 ВАЖНО: не выбираем deviceId вообще
html5QrCode.start(
    { facingMode: { exact: "environment" } },   // 👈 ВОТ ТУТ ФИКС
    {

        fps: 15,   // 🔥 быстрее
        qrbox: { width: 350, height: 200 },  // 🔥 шире зона
        disableFlip: true

        formatsToSupport: [
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.QR_CODE
        ]
    },
    onScanSuccess
).then(()=>{

    document.getElementById("status").innerText =
    "🎯 наведите на код";

}).catch(err=>{

    console.log(err);

    // 🔁 fallback (если exact не поддержался iPhone)
    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 12,
            qrbox: 250
        },
        onScanSuccess
    ).then(()=>{

        document.getElementById("status").innerText =
        "🎯 наведите на код";

    }).catch(err2=>{
        console.log(err2);
        document.getElementById("status").innerText =
        "❌ камера не запустилась";
    });

});

}

</script>

</body>
</html>
