<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NP SCANNER STABLE</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

#scanner{
    width:100%;
    height:60vh;
}

#ttn{
    font-size:22px;
    margin-top:10px;
    color:#00f2fe;
    word-break:break-all;
}

#status{
    font-size:14px;
    color:#aaa;
    margin-top:5px;
}

button{
    padding:12px 20px;
    margin:10px;
    background:#00f2fe;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>NP SCANNER STABLE</h2>

<button onclick="startScan()">📷 СТАРТ</button>

<div id="scanner"></div>

<div id="ttn">---</div>
<div id="status">ожидание...</div>

<audio id="ok" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw6G3Z-JrqLGKu-SIljgynPBgmFDksg6BUXBIW-fMM1By-67tjli7LCzrCZyXvTuhkk/exec";

let last = "";

function startScan(){

document.getElementById("status").innerText = "📷 запуск камеры...";

Quagga.init({
    inputStream : {
        name : "Live",
        type : "LiveStream",
        target: document.querySelector('#scanner'),
        constraints: {
            facingMode: "environment"
        }
    },
    decoder : {
        readers : [
            "code_128_reader",
            "code_39_reader",
            "ean_reader",
            "ean_8_reader",
            "upc_reader"
        ]
    },
    locate: true,
    frequency: 10
}, function(err) {
    if (err) {
        console.log(err);
        document.getElementById("status").innerText = "❌ ошибка камеры";
        return;
    }
    Quagga.start();
    document.getElementById("status").innerText = "🎯 наведите на штрихкод";
});

Quagga.onDetected(function(result){

    let code = result.codeResult.code;

    if(!code) return;

    if(code === last) return;

    last = code;

    document.getElementById("ttn").innerText = code;
    document.getElementById("status").innerText = "✔ СКАН";

    document.getElementById("ok").play().catch(()=>{});

    fetch(SCRIPT_URL,{
        method:"POST",
        headers:{
            "Content-Type":"text/plain"
        },
        body:JSON.stringify({ttn:code})
    });

});

}

</script>

</body>
</html>
