<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  
  <!-- фон -->
  <rect width="512" height="512" rx="120" fill="#0b0b0b"/>

  <!-- рамка сканера -->
  <rect x="120" y="150" width="272" height="140" rx="18"
        fill="none" stroke="#00f2fe" stroke-width="10"/>

  <!-- линия сканирования (СТАТИЧНАЯ) -->
  <rect x="140" y="220" width="232" height="6" fill="#00f2fe"/>

  <!-- штрихи как barcode -->
  <g fill="#00f2fe">
    <rect x="150" y="320" width="10" height="40"/>
    <rect x="175" y="310" width="10" height="50"/>
    <rect x="200" y="325" width="10" height="35"/>
    <rect x="225" y="300" width="10" height="60"/>
    <rect x="250" y="315" width="10" height="45"/>
    <rect x="275" y="305" width="10" height="55"/>
    <rect x="300" y="325" width="10" height="35"/>
    <rect x="325" y="310" width="10" height="50"/>
  </g>

</svg>
