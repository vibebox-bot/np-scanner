<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="120" fill="#0b0b0b"/>

  <!-- scanner frame -->
  <rect x="120" y="150" width="272" height="140" rx="18"
        fill="none" stroke="url(#g)" stroke-width="10"/>

  <!-- scan line -->
  <rect x="140" y="220" width="232" height="6" fill="url(#g)">
    <animate attributeName="y" values="160;270;160" dur="1.6s" repeatCount="indefinite"/>
  </rect>

  <!-- dots (barcode feel) -->
  <g fill="url(#g)">
    <rect x="140" y="310" width="10" height="40"/>
    <rect x="165" y="300" width="10" height="50"/>
    <rect x="190" y="320" width="10" height="30"/>
    <rect x="215" y="295" width="10" height="55"/>
    <rect x="240" y="310" width="10" height="40"/>
    <rect x="265" y="300" width="10" height="50"/>
    <rect x="290" y="320" width="10" height="30"/>
    <rect x="315" y="295" width="10" height="55"/>
  </g>

</svg>
